services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: devmetrics_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devmetrics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Backend API
  backend:
    build: ./backend
    container_name: devmetrics_backend
    ports:
      - "8000:8000"
      - "5556:5556"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/devmetrics
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend
  frontend:
    build: ./frontend
    container_name: devmetrics_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  postgres_data: